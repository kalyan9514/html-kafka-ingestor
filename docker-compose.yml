#version: "3.8"

services:

  #Zookeeper: Kafka's coordinator — manages broker metadata
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181  #port Kafka talks to Zookeeper on
      ZOOKEEPER_TICK_TIME: 2000    #heartbeat interval in ms
    ports:
      - "2181:2181"

  #Kafka: the message broker between producer and consumer
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper              #Kafka starts only after Zookeeper is ready
    ports:
      - "9092:9092"            #port our Go app connects to
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181          
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092  
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1        

  #Schema Registry: validates and stores Avro schemas for Kafka messages
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092  
      SCHEMA_REGISTRY_HOST_NAME: schema-registry

  #MySQL: relational database where ingested rows are stored
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass       
      MYSQL_DATABASE: ingestor_db          
      MYSQL_USER: ingestor                 
      MYSQL_PASSWORD: ingestor_pass        
    volumes:
      - mysql_data:/var/lib/mysql          

  #Prometheus: scrapes and stores metrics from our Go app
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml  

  #Grafana: visualizes Prometheus metrics as dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"             
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin   

#named volume so MySQL data survives container restarts
volumes:
  mysql_data: